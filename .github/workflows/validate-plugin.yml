name: Validate ADVPL Specialist

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Copilot structure
        run: |
          set -e
          echo "Checking .github/copilot-instructions.md..."
          test -f .github/copilot-instructions.md || { echo "ERROR: .github/copilot-instructions.md not found"; exit 1; }
          echo "Checking .github/prompts/ directory..."
          test -d .github/prompts || { echo "ERROR: .github/prompts/ directory not found"; exit 1; }
          COUNT=$(ls .github/prompts/*.prompt.md 2>/dev/null | wc -l)
          echo "Found $COUNT prompt files"
          test "$COUNT" -gt 0 || { echo "ERROR: no .prompt.md files found"; exit 1; }

      - name: Validate YAML frontmatter
        run: |
          FAIL=0
          for f in commands/*.md agents/*.md .github/prompts/*.prompt.md; do
            [ -f "$f" ] || continue
            if ! head -1 "$f" | grep -q "^---$"; then
              echo "ERROR: $f missing frontmatter opener"
              FAIL=1
              continue
            fi
            FM_END=$(awk '/^---$/{c++; if(c==2){print NR; exit}}' "$f")
            if [ -z "$FM_END" ]; then
              echo "ERROR: $f frontmatter not closed"
              FAIL=1
              continue
            fi
          done
          exit $FAIL

      - name: Validate agent frontmatter has description
        run: |
          FAIL=0
          for f in agents/*.md; do
            if ! sed -n "/^---$/,/^---$/p" "$f" | grep -q "^description:"; then
              echo "ERROR: $f missing required frontmatter field: description"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Validate command frontmatter has description
        run: |
          FAIL=0
          for f in commands/*.md; do
            if ! sed -n "/^---$/,/^---$/p" "$f" | grep -q "^description:"; then
              echo "ERROR: $f missing required frontmatter field: description"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Validate skill reference.md size (<= 500 lines)
        run: |
          FAIL=0
          for f in skills/*/reference.md; do
            [ -f "$f" ] || continue
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 500 ]; then
              echo "ERROR: $f has $LINES lines (max 500). Move content to supporting files."
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Check internal links
        run: |
          FAIL=0
          for f in commands/*.md agents/*.md skills/*/reference.md; do
            [ -f "$f" ] || continue
            DIR=$(dirname "$f")
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              TARGET="$DIR/$link"
              if [ ! -f "$TARGET" ]; then
                echo "BROKEN LINK in $f: $link -> $TARGET"
                FAIL=1
              fi
            done < <(grep -oE '\.\./[a-zA-Z0-9_/.-]+\.md' "$f" || true)
          done
          exit $FAIL
